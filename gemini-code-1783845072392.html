<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>びょうき予防（よぼう）クイズ - 消えるボタン</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0fdf4;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
            overflow: hidden; /* ×マーク表示時のスクロール防止 */
        }
        h1 {
            color: #16a34a;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .stage {
            background-color: white;
            border: 4px solid #86efac;
            border-radius: 20px;
            max-width: 500px;
            margin: 15px auto;
            padding: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            position: relative; /* ×マークの基準点 */
        }
        #enemy-area {
            font-size: 70px;
            height: 110px;
            line-height: 110px;
            margin-bottom: 10px;
        }
        #game-message {
            font-size: 18px;
            font-weight: bold;
            color: #374151;
            min-height: 54px;
            margin-bottom: 20px;
            padding: 5px;
        }
        /* 10個のボタンを並べる設定 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 440px;
            margin: 0 auto;
        }
        .choice-btn {
            background-color: #f8fafc;
            border: 3px solid #cbd5e1;
            border-radius: 15px;
            padding: 15px 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.3s ease; /* 消える時の動き */
        }
        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        /* ボタンが消える時のスタイル */
        .choice-btn.fade-out {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none; /* クリック不可 */
        }
        #restart-btn {
            display: none;
            background-color: #e11d48;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #9f1239;
        }
        #restart-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 大きなバツマークのスタイル */
        #wrong-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.4); /* 赤い背景 */
            color: white;
            font-size: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        #wrong-overlay.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>どっちが せいかい？バイキンたいじ</h1>
    
    <div class="stage">
        <div id="enemy-area">👾</div>
        <div id="game-message">バイキンが あらわれた！<br>体に いいことを えらんで やっつけよう！</div>

        <div class="grid-container" id="buttons-area">
            <!-- 正解の選択肢（6つ） -->
            <button class="choice-btn" id="btn-1" onclick="checkAnswer(true, 'てを あらう', '🧼', 'btn-1')">🧼<br>てをあらう</button>
            <button class="choice-btn" id="btn-2" onclick="checkAnswer(true, 'うがいを する', '🥛', 'btn-2')">🥛<br>うがいをする</button>
            <button class="choice-btn" id="btn-3" onclick="checkAnswer(true, 'はやく ねる', '💤', 'btn-3')">💤<br>はやくねる</button>
            <button class="choice-btn" id="btn-4" onclick="checkAnswer(true, 'ごはんを たべる', '🍙', 'btn-4')">🍙<br>ごはんをたべる</button>
            <button class="choice-btn" id="btn-5" onclick="checkAnswer(true, 'マスクを する', '😷', 'btn-5')">😷<br>マスクをする</button>
            <button class="choice-btn" id="btn-6" onclick="checkAnswer(true, 'まどを あける', '🪟', 'btn-6')">🪟<br>まどをあける</button>
            
            <!-- 不正解の選択肢（4つ） -->
            <button class="choice-btn" onclick="checkAnswer(false, 'よふかしを する', '😈')">😈<br>よふかしをする</button>
            <button class="choice-btn" onclick="checkAnswer(false, 'てを あらわない', '🦠')">🦠<br>てをあらわない</button>
            <button class="choice-btn" onclick="checkAnswer(false, 'おかしだけ たべる', '🍭')">🍭<br>おかしだけたべる</button>
            <button class="choice-btn" onclick="checkAnswer(false, 'つめを かむ', '🦷')">🦷<br>つめをかむ</button>
        </div>

        <button id="restart-btn" onclick="resetGame()">もう一回あそぶ！</button>
    </div>

    <!-- 不正解時のオーバーレイ -->
    <div id="wrong-overlay">×</div>

    <script>
        let correctCount = 0; // 正解した数
        const totalCorrect = 6; // 全正解数

        function checkAnswer(isCorrect, action, emoji, btnId) {
            const enemyArea = document.getElementById('enemy-area');
            const gameMessage = document.getElementById('game-message');
            const restartBtn = document.getElementById('restart-btn');
            const wrongOverlay = document.getElementById('wrong-overlay');

            if (isCorrect) {
                // 正解のときの演出
                enemyArea.innerHTML = '✨👑✨';
                gameMessage.innerHTML = `せいかい！「${action}」の わざ！<br>バイキンを やっつけたぞ！すごーい！`;
                
                // ボタンを消す（フェードアウトのクラスを追加）
                const btn = document.getElementById(btnId);
                btn.classList.add('fade-out');

                correctCount++;
                // 全ての正解ボタンが消えたらリセットボタンを出す
                if (correctCount === totalCorrect) {
                    gameMessage.innerHTML = `すごい！ すべての「体に いいこと」が できたね！<br>病気（びょうき）予防（よぼう）の マスターだ！`;
                    restartBtn.style.display = 'inline-block';
                }

            } else {
                // 不正解のときの演出
                enemyArea.innerHTML = '🔥👾🔥';
                gameMessage.innerHTML = `あちゃー！「${action}」だと<br>バイキンが 元気になっちゃった！ちがうのを えらぼう！`;
                
                // 大きなバツマークを表示（1.5秒間）
                wrongOverlay.classList.add('show');
                setTimeout(() => {
                    wrongOverlay.classList.remove('show');
                }, 1500);
            }
        }

        function resetGame() {
            location.reload(); // ページをリロードしてゲームを最初からにする
        }
    </script>

</body>
</html>
